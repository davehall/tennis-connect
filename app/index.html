            // Compute a fresh-looking "last updated" label (use the last completed quarter end so it never shows a future month)
            const lastUpdatedText = React.useMemo(() => {
                const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
                const now = new Date();
                const month = now.getMonth(); // 0-based
                let year = now.getFullYear();
                // current quarter index (0..3)
                const currentQuarter = Math.floor(month / 3);
                // use the previous (last completed) quarter
                let lastQuarter = currentQuarter - 1;
                if (lastQuarter < 0) { lastQuarter = 3; year -= 1; }
                const qEndIndex = lastQuarter * 3 + 2; // 2,5,8,11 → Mar/Jun/Sep/Dec
                const monthName = months[qEndIndex] || months[0];
                return monthName + ' ' + year;
            }, []);
            
            const testimonials = [

            ];

            const nextTestimonial = () => setTestimonialIndex((prev) => (prev + 1) % testimonials.length);
            const prevTestimonial = () => setTestimonialIndex((prev) => (prev - 1 + testimonials.length) % testimonials.length);

                            if(!container){
                                // try to wait briefly for React to mount the modal
                                await new Promise(res => setTimeout(res, 50));
                            }
                            await loadPartial();
                            const c = getContainer(); if(c) c.classList.remove('hidden');
                        }
                        // Close when close button clicked
                        if (target.id === 'close-map-disclaimer' || (target.closest && target.closest('#close-map-disclaimer'))) {
                            const c = getContainer(); if(c) c.classList.add('hidden');
                        }
                        // Close when clicking the backdrop
                        if (target.id === 'map-disclaimer-backdrop') {
                            const c = getContainer(); if(c) c.classList.add('hidden');
                        }
                    });
                })();
                // Stats population
                (function initStats(){
                    // Utility class for consistent radius (matches rounded-md)
                    const styleTag = document.createElement('style');
                    styleTag.textContent = '.r-md{border-radius:0.375rem;}';
                    document.head.appendChild(styleTag);
                    function compute(){
                        const clubs = Array.isArray(window.allClubs)? window.allClubs.slice(): [];
                        if(!clubs.length){ setTimeout(compute, 300); return; }
                        const gridEl = document.getElementById('stats-grid');
                        const barsEl = document.getElementById('surface-bars');
                        const topEl = document.getElementById('top-counties');
                        if(!gridEl || !barsEl || !topEl){ setTimeout(compute, 120); return; }
                        // Debug (can be removed later)
                        if(!window.__statsInitLogged){ console.debug('[stats] Initialising stats section with', clubs.length, 'clubs'); window.__statsInitLogged=true; }
                        // Basic aggregates
                        const total = clubs.length;
                        const bySport = clubs.reduce((acc,c)=>{ acc[c.sport]= (acc[c.sport]||0)+1; return acc; },{});
                        const tennisClubs = clubs.filter(c=> c.sport==='Tennis');
                        // Surfaces (use primary/first listed surface when multiple are present)
                        const surfaceCounts = {};
                        tennisClubs.forEach(c=>{
                            const raw=(c.court_surface||c.court_type||'').toString().trim();
                            if(!raw) return;
                            // Primary surface = first token before '/', ',', '|' or the word 'and'
                            const primary = raw.split(/\s*(?:\/|,|\||\band\b)\s*/i)[0].toLowerCase();
                            if(!primary) return;
                            if(/matchclay|synthetic clay|artificial clay|smashcourt|topclay|claytech|clayrite|lano/.test(primary)){
                                surfaceCounts['Artificial Clay']=(surfaceCounts['Artificial Clay']||0)+1;
                            } else if(/\bnatural\s+clay\b|\bred\s+clay\b|(^|\s)clay($|\s)/.test(primary)){
                                surfaceCounts['Natural Clay']=(surfaceCounts['Natural Clay']||0)+1;
                            } else if(/artificial grass|astro|savannah|synthetic grass|tigerturf/.test(primary)){
                                surfaceCounts['Artificial Grass']=(surfaceCounts['Artificial Grass']||0)+1;
                            } else if(/real grass|natural grass/.test(primary)){
                                surfaceCounts['Natural Grass']=(surfaceCounts['Natural Grass']||0)+1;
                            } else if(/\bhard\b/.test(primary)){
                                surfaceCounts['Hardcourt']=(surfaceCounts['Hardcourt']||0)+1;
                            }
                        });
                        const surfaceLabels=['Artificial Grass','Hardcourt','Artificial Clay','Natural Clay','Natural Grass'];
                        const surfaceTotal = Object.values(surfaceCounts).reduce((a,b)=>a+b,0)||1;
                        // Top counties by count (all sports)
                        const countyCounts = clubs.reduce((acc,c)=>{ if(c.county){ acc[c.county]=(acc[c.county]||0)+1; } return acc; },{});
                        const topCounties = Object.entries(countyCounts).sort((a,b)=> b[1]-a[1]).slice(0,5);
                        // Build stat cards (only three requested)
                        const stats=[
                            { label:'Tennis clubs', value: bySport['Tennis']||0, tip:'Clubs whose primary sport is Tennis.' },
                            { label:'Padel clubs', value: bySport['Padel']||0, tip:'Padel-only or primary Padel locations.' },
                            { label:'Pickleball clubs', value: bySport['Pickleball']||0, tip:'Pickleball-focused venues.' }
                        ];
                        const themes=[
                            { bg:'', number:'text-teal-800', label:'text-teal-700', bar:'bg-teal-300' },
                            { bg:'', number:'text-amber-800', label:'text-amber-700', bar:'bg-amber-300' },
                            { bg:'', number:'text-blue-800', label:'text-blue-700', bar:'bg-blue-300' }
                        ];
                        gridEl.innerHTML = stats.map((s,i)=> { const t=themes[i%themes.length]; return `\n<div class=\"relative w-full max-w-[380px] overflow-hidden rounded-xl p-5 sm:p-6 md:p-7 bg-gradient-to-br ${t.bg} border border-slate-300 shadow-sm flex flex-col items-center text-center\">\n  <div class=\"text-5xl sm:text-6xl md:text-7xl font-heading font-light tracking-tight ${t.number} count-up\" data-target=\"${s.value}\" data-decimal=\"0\">0</div>\n  <p class=\"mt-4 sm:mt-5 text-[15px] sm:text-[16px] font-medium uppercase tracking-[0.22em] ${t.label}\">${s.label}</p>\n  <span class=\"mt-3 sm:mt-4 h-1 w-12 rounded-full ${t.bar}\"></span>\n</div>`; }).join('');
                        // Surface bars (descending order by count)
                        const surfaceEntries = surfaceLabels
                            .filter(l=> surfaceCounts[l])
                            .map(l=> { const count=surfaceCounts[l]; const pct=Math.round((count/surfaceTotal)*100); return { label:l, count, pct }; })
                            .sort((a,b)=> b.count - a.count);
                        barsEl.innerHTML = surfaceEntries.map(se=> `<div><div class=\"flex items-center justify-between mb-1 text-sm\"><span class=\"font-medium text-slate-700\">${se.label}</span><span class=\"text-slate-500\">${se.pct}%</span></div><div class=\"h-2 md:h-3 r-md bg-slate-200 overflow-hidden\"><div class=\"h-full bg-teal-500 transition-all duration-700 ease-out\" style=\"width:0%;\" data-final=\"${se.pct}\"></div></div></div>`).join('');
                        topEl.innerHTML = topCounties.map(([county,count])=>{ const pct = Math.round((count/total)*100); return `<div><div class=\"flex items-center justify-between mb-1 text-sm\"><span class=\"font-medium text-slate-700\">${county}</span><span class=\"text-slate-500\">${count} (${pct}%)</span></div><div class=\"h-2 md:h-3 r-md bg-slate-200 overflow-hidden\"><div class=\"h-full bg-amber-500 transition-all duration-700 ease-out\" style=\"width:0%;\" data-final=\"${pct}\"></div></div></div>`; }).join('');
                                                // Animate counts
                                                requestAnimationFrame(()=>{
                                                    document.querySelectorAll('.count-up').forEach(el=>{
                                                        const target=parseFloat(el.dataset.target); const decimals=parseInt(el.dataset.decimal||'0',10); const duration=900; const start=performance.now();
                                                        function step(ts){ const p=Math.min(1,(ts-start)/duration); const val=target*p; el.textContent=val.toFixed(decimals); if(p<1) requestAnimationFrame(step); else el.textContent=target.toFixed(decimals); }
                                                        requestAnimationFrame(step);
                                                    });
                                                    // Animate bars after a tiny delay
                                                    setTimeout(()=>{ document.querySelectorAll('#surface-bars [data-final], #top-counties [data-final]').forEach(bar=>{ const final=bar.getAttribute('data-final'); bar.style.width=final+'%'; }); },130);
                                                });
                    }
                    compute();
                })();
    </script>
        <!-- Normalize Court Surface icons in dynamic map popups (size / stroke) -->
            <script>
            (function(){
                function ensureThreeLines(svg){
                    var paths = svg.querySelectorAll('path');
                    if(paths.length >= 3) return; // already correct
                    // Preserve optional title element
                    var titleEl = svg.querySelector('title');
                    // Replace inner content with three wavy lines
                    svg.innerHTML = (titleEl?('<title>'+titleEl.textContent+'</title>'):'')+
                        '<path d="M4 8c1-.8 2-.8 3 0s2 .8 3 0 2-.8 3 0 2 .8 3 0 2-.8 3 0" />'+
                        '<path d="M4 12c1-.8 2-.8 3 0s2 .8 3 0 2-.8 3 0 2 .8 3 0 2-.8 3 0" />'+
                        '<path d="M4 16c1-.8 2-.8 3 0s2 .8 3 0 2-.8 3 0 2 .8 3 0 2-.8 3 0" />';
                }
                function normalize(root){
                    if(!root) return;
                    root.querySelectorAll("div[title='Court Surface'] svg[viewBox='0 0 22 22']").forEach(function(svg){
                        if(!svg.dataset.norm){
                            svg.setAttribute('width','18');
                            svg.setAttribute('height','18');
                            svg.setAttribute('stroke','#94a3b8');
                            svg.setAttribute('stroke-width','1.8');
                            svg.setAttribute('fill','none');
                            svg.style.display='block';
                            ensureThreeLines(svg);
                            svg.dataset.norm='1';
                        } else {
                            ensureThreeLines(svg);
                        }
                    });
                }
                const mo = new MutationObserver(function(list){
                    list.forEach(function(m){
                        m.addedNodes && m.addedNodes.forEach(function(n){
                            if(n.nodeType===1 && n.classList.contains('leaflet-popup')) normalize(n);
                        });
                    });
                });
                if(document.body) mo.observe(document.body,{childList:true,subtree:true});
                normalize(document);
                window._normalizeSurfaceIcon = normalize;
            })();
            </script>
