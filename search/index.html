  <script>
    // Apply surface filter from query string after the app mounts
    (function(){
      const params = new URLSearchParams(window.location.search);
      const rawSurface = params.get('surface');
      if(!rawSurface) return;
      // Normalize a few aliases to UI labels
      const norm = (v)=>{
        const s = (v||'').toString().trim().toLowerCase();
        if(!s) return '';
        if(s.includes('natural') && s.includes('grass')) return 'Natural Grass';
        if((s.includes('real')||s.includes('natural')) && s.includes('clay')) return 'Natural Clay';
        if(s.includes('artificial') && s.includes('grass')) return 'Artificial Grass';
        if((s.includes('artificial')||s.includes('synthetic')||s.includes('matchclay')||s.includes('smashcourt')||s.includes('topclay')||s.includes('claytech')||s.includes('clayrite')||s.includes('lano')) && s.includes('clay')) return 'Artificial Clay';
        if(s.includes('hard')) return 'Hardcourt';
        // Fallback: title case first letters
        return (s.charAt(0).toUpperCase()+s.slice(1));
      };
      const surface = norm(rawSurface);
      if(!surface) return;
      function tryApply(){
        // Ensure Tennis is the active sport (surface filter only shows for Tennis)
        const sportBtns = Array.from(document.querySelectorAll('button'));
        const tennisBtn = sportBtns.find(b=> (b.textContent||'').trim() === 'Tennis');
        if(tennisBtn && !/bg-white\s+text-teal-600/.test(tennisBtn.className||'')){
          tennisBtn.click();
        }
        // Find selects that contain an option 'All surfaces'
        const isSurfaceSelect = sel => Array.from(sel.options||[]).some(o => (o.textContent||'').trim().toLowerCase().startsWith('all surfaces'));
        const surfaceSelects = Array.from(document.querySelectorAll('select')).filter(isSurfaceSelect);
        if(!surfaceSelects.length) return false;
        let applied = false;
        surfaceSelects.forEach(sel => {
          const opts = Array.from(sel.options||[]);
          const match = opts.find(o => (o.value||'') === surface) || opts.find(o => (o.textContent||'').trim().toLowerCase().startsWith(surface.toLowerCase()));
          if(match){ sel.value = match.value; sel.dispatchEvent(new Event('change', { bubbles:true })); applied = true; }
        });
        return applied;
      }
      let tries = 0;
      const h = setInterval(()=>{ if(tryApply() || ++tries > 80) clearInterval(h); }, 150);
      window.addEventListener('DOMContentLoaded', tryApply);
      window.addEventListener('load', tryApply);
    })();
  </script>
  <script>
    // Fallback: apply ?query or ?q to the global search input if present.
    // This uses a polling approach (like the surface script) and dispatches an input event
    // so React's onChange handler picks up the value even if the bundle mounted after page load.
    (function(){
      const params = new URLSearchParams(window.location.search);
      const rawQuery = params.get('query') || params.get('q');
      if(!rawQuery) return;
      const decoded = decodeURIComponent(rawQuery);
      function tryApply(){
        const input = document.getElementById('global-search');
        if(!input) return false;
        try {
          // Only apply if the input is empty or different
          if((input.value || '').trim() !== decoded.trim()){
            input.focus && input.focus();
            // set value and notify React by dispatching an InputEvent
            input.value = decoded;
            const ev = new Event('input', { bubbles: true });
            input.dispatchEvent(ev);
          }
          return true;
        } catch (e){ return false; }
      }
      let tries = 0;
      const h = setInterval(()=>{ if(tryApply() || ++tries > 80) clearInterval(h); }, 150);
      window.addEventListener('DOMContentLoaded', tryApply);
      window.addEventListener('load', tryApply);
    })();
  </script>

  <!-- Normalize Court Surface icons in dynamic map popups (size / stroke) -->
  <script>
  (function(){
    function ensureThreeLines(svg){
      var paths = svg.querySelectorAll('path');
      if(paths.length >= 3) return;
      var titleEl = svg.querySelector('title');
      svg.innerHTML = (titleEl?('<title>'+titleEl.textContent+'</title>'):'')+
        '<path d="M4 8c1-.8 2-.8 3 0s2 .8 3 0 2-.8 3 0 2 .8 3 0 2-.8 3 0" />'+
        '<path d="M4 12c1-.8 2-.8 3 0s2 .8 3 0 2-.8 3 0 2 .8 3 0 2-.8 3 0" />'+
        '<path d="M4 16c1-.8 2-.8 3 0s2 .8 3 0 2-.8 3 0 2 .8 3 0 2-.8 3 0" />';
    }
    function normalize(root){
      if(!root) return;
      root.querySelectorAll("div[title='Court Surface'] svg[viewBox='0 0 22 22']").forEach(function(svg){
        if(!svg.dataset.norm){
          svg.setAttribute('width','18');
          svg.setAttribute('height','18');
          svg.setAttribute('stroke','#94a3b8');
          svg.setAttribute('stroke-width','1.8');
          svg.setAttribute('fill','none');
          svg.style.display='block';
          ensureThreeLines(svg);
          svg.dataset.norm='1';
        } else {
          ensureThreeLines(svg);
        }
      });
    }
    const mo = new MutationObserver(function(list){
      list.forEach(function(m){
        m.addedNodes && m.addedNodes.forEach(function(n){
          if(n.nodeType===1 && n.classList.contains('leaflet-popup')) normalize(n);
        });
      });
    });
    if(document.body) mo.observe(document.body,{childList:true,subtree:true});
    normalize(document);
    window._normalizeSurfaceIcon = normalize;
  })();
  </script>
